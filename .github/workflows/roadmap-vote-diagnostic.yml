name: Roadmap vote diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Call production roadmap payload endpoint without signing
        run: node scripts/roadmap-vote-diagnostic.mjs
        env:
          AUDIT_BASE_URL: https://ott-terminal-mvp.vercel.app
          AUDIT_OUTPUT_DIR: artifacts/roadmap-vote-diagnostic

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roadmap-vote-diagnostic
          path: artifacts/roadmap-vote-diagnostic
          if-no-files-found: error
          retention-days: 7
