name: Fix founder access TypeScript

on:
  push:
    branches:
      - feature/founder-access-manager
    paths:
      - .github/founder-access-types-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout founder access branch
        uses: actions/checkout@v4
        with:
          ref: feature/founder-access-manager
          fetch-depth: 0

      - name: Fix Supabase row typing
        run: node scripts/fix-founder-access-types.mjs

      - name: Commit TypeScript fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/server/premiumAccessService.ts
          git commit -m "Fix founder access Supabase row types"
          git push origin HEAD:feature/founder-access-manager
