name: Patch research evidence scout

on:
  push:
    branches:
      - feature/research-evidence-scout
    paths:
      - .github/research-evidence-scout-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout evidence scout branch
        uses: actions/checkout@v4
        with:
          ref: feature/research-evidence-scout
          fetch-depth: 0

      - name: Integrate evidence scout
        run: node scripts/patch-research-evidence-scout.mjs

      - name: Verify route contract
        run: node scripts/audit-public-routes.mjs

      - name: Commit evidence scout integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/access-payment.ts src/server/researchReviewService.ts src/lib/researchReviewClient.ts src/tabs/FounderResearchReview.tsx
          git commit -m "Link verified web sources to research scoring"
          git push origin HEAD:feature/research-evidence-scout
