name: Patch research request uploads

on:
  push:
    branches:
      - feature/research-request-uploads
    paths:
      - .github/research-request-uploads-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout upload branch
        uses: actions/checkout@v4
        with:
          ref: feature/research-request-uploads
          fetch-depth: 0

      - name: Integrate research request panel
        run: node scripts/patch-research-request-panel.mjs

      - name: Verify route contract
        run: node scripts/audit-public-routes.mjs

      - name: Commit research request panel
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tabs/XrplVerifyTab.tsx
          git commit -m "Add persistent token research request uploads"
          git push origin HEAD:feature/research-request-uploads
