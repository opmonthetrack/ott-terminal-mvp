name: Patch founder access Academy integration

on:
  push:
    branches:
      - feature/founder-access-manager
    paths:
      - .github/founder-access-manager-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout founder access branch
        uses: actions/checkout@v4
        with:
          ref: feature/founder-access-manager
          fetch-depth: 0

      - name: Integrate premium grants
        run: node scripts/patch-founder-access-academy.mjs

      - name: Verify route contract
        run: node scripts/audit-public-routes.mjs

      - name: Commit Academy entitlement integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tabs/AcademyTabV4.tsx
          git commit -m "Enforce founder premium grants in Academy"
          git push origin HEAD:feature/founder-access-manager
