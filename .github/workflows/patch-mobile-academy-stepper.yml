name: Patch token research foundations

on:
  push:
    branches:
      - feature/token-research-foundations
    paths:
      - .github/token-research-foundations-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: feature/token-research-foundations
          fetch-depth: 0

      - name: Integrate issuer research
        run: node scripts/patch-token-research-foundations.mjs

      - name: Verify route contract
        run: node scripts/audit-public-routes.mjs

      - name: Commit issuer research integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/ott.ts src/tabs/XrplVerifyTab.tsx
          git commit -m "Add live XRPL issuer research audit"
          git push origin HEAD:feature/token-research-foundations
