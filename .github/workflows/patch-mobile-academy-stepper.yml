name: Patch founder research review

on:
  push:
    branches:
      - feature/founder-research-review
    paths:
      - .github/founder-research-review-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout research review branch
        uses: actions/checkout@v4
        with:
          ref: feature/founder-research-review
          fetch-depth: 0

      - name: Integrate research review
        run: node scripts/patch-founder-research-review.mjs

      - name: Verify route contract
        run: node scripts/audit-public-routes.mjs

      - name: Commit research review integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/access-payment.ts src/main.tsx src/tabs/XrplVerifyTab.tsx
          git commit -m "Integrate founder research review and watchlist"
          git push origin HEAD:feature/founder-research-review
