name: Patch mobile Academy stepper

on:
  push:
    branches:
      - feature/mobile-academy-stepper
    paths:
      - .github/mobile-academy-stepper-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Academy branch
        uses: actions/checkout@v4
        with:
          ref: feature/mobile-academy-stepper
          fetch-depth: 0

      - name: Apply Academy stepper
        run: node scripts/patch-mobile-academy-stepper.mjs

      - name: Verify route contract
        run: node scripts/audit-public-routes.mjs

      - name: Commit Academy stepper
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tabs/AcademyTabV4.tsx
          git commit -m "Turn Academy lessons into mobile step flows"
          git push origin HEAD:feature/mobile-academy-stepper
