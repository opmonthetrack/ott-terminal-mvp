name: Patch premium Wallet Academy

on:
  push:
    branches:
      - feature/premium-wallet-academy
    paths:
      - .github/premium-wallet-academy-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Wallet Academy branch
        uses: actions/checkout@v4
        with:
          ref: feature/premium-wallet-academy
          fetch-depth: 0

      - name: Integrate Wallet Academy
        run: node scripts/patch-premium-wallet-academy.mjs

      - name: Verify route contract
        run: node scripts/audit-public-routes.mjs

      - name: Commit Wallet Academy integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tabs/AcademyTabV4.tsx
          git commit -m "Add premium Wallet Academy to Academy navigation"
          git push origin HEAD:feature/premium-wallet-academy
