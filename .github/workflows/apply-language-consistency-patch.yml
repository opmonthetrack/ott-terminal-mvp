name: Apply Language Consistency Patch

on:
  push:
    branches:
      - feature/academy-ai-profile-session
    paths:
      - scripts/apply-language-consistency-patch.mjs
      - .github/workflows/apply-language-consistency-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/academy-ai-profile-session
          fetch-depth: 0

      - name: Apply language consistency patch
        run: node scripts/apply-language-consistency-patch.mjs

      - name: Commit patched files
        run: |
          if git diff --quiet; then
            echo "No patch changes needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/tabs/DashboardTab.tsx
          git commit -m "Make English default and localize Daily Snapshot [skip ci]"
          git push origin HEAD:feature/academy-ai-profile-session
