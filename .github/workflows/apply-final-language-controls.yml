name: Apply final language controls

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: agent/full-release-hardening-20260724
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply final Dutch translations
        run: node scripts/fix-final-language-controls.mjs

      - name: Install reproducibly
        run: npm ci --no-audit --no-fund

      - name: Validate routes TypeScript and production build
        run: npm run quality

      - name: Commit language fix
        run: |
          if git diff --quiet src/App.tsx; then
            echo "No language change remains."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "Complete final Dutch control translations [skip ci]"
          git push origin HEAD:agent/full-release-hardening-20260724
