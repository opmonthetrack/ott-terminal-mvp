name: Platform quality

on:
  push:
    branches:
      - main
      - feature/complete-platform-foundations
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: platform-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Routes, TypeScript and production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # package.json already contains dependencies that are not represented in
        # the historical lockfile. npm install resolves the declared manifest so
        # validation can run; regenerating and committing the lockfile remains a
        # separate dependency-maintenance task.
        run: npm install --no-audit --no-fund

      - name: Audit all 17 public routes
        run: npm run audit:routes

      - name: TypeScript validation
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee typescript-errors.txt

      - name: Upload TypeScript diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: |
            typescript-errors.txt
            api/certificate.ts
          if-no-files-found: ignore
          retention-days: 7

      - name: Production build
        run: npm run build

      - name: Verify required public files
        shell: bash
        run: |
          test -f dist/index.html
          test -d dist/assets
          test -s dist/index.html
          test -s dist/privacy.html
          test -s dist/terms.html
          test -s dist/robots.txt
          test -s dist/sitemap.xml
          test -s dist/manifest.webmanifest
