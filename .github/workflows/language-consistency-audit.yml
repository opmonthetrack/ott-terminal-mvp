name: Language Consistency Audit

on:
  push:
    branches:
      - feature/academy-ai-profile-session
    paths:
      - scripts/language-consistency-audit.mjs
      - .github/workflows/language-consistency-audit.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/academy-ai-profile-session

      - name: Run language consistency audit
        run: node scripts/language-consistency-audit.mjs

      - name: Upload language audit
        uses: actions/upload-artifact@v4
        with:
          name: public-tab-language-audit
          path: artifacts/language-audit
          if-no-files-found: error
          retention-days: 7
