name: Finalize Language Cleanup

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/academy-ai-profile-session
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Remove temporary language tooling
        run: |
          git rm -f --ignore-unmatch \
            .github/language-finalize-marker.txt \
            .github/workflows/language-consistency-audit.yml \
            .github/workflows/apply-language-consistency-patch.yml \
            .github/workflows/apply-full-language-files.yml \
            .github/workflows/finalize-language-cleanup.yml \
            scripts/language-consistency-audit.mjs \
            scripts/apply-language-consistency-patch.mjs \
            scripts/apply-full-language-files.mjs \
            scripts/apply-ledger-intel-tab.mjs \
            scripts/apply-ott-intelligence-tab.mjs \
            scripts/apply-news-tab.mjs \
            scripts/apply-daily-check-in-tab.mjs \
            scripts/apply-roadmap-tab.mjs \
            scripts/apply-roadmap-final-localization.mjs \
            scripts/apply-terminal-home-tab.mjs \
            scripts/apply-xaman-center-tab.mjs

      - name: Install dependencies
        run: npm ci

      - name: Validate final TypeScript project
        run: npm run lint

      - name: Commit clean product branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove temporary language migration tooling [skip ci]"
          git pull --rebase origin feature/academy-ai-profile-session
          git push origin HEAD:feature/academy-ai-profile-session
