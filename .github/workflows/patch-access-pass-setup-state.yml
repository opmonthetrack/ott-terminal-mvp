name: Patch Access Pass setup state

on:
  push:
    branches:
      - feature/access-pass-order-delivery
    paths:
      - .github/workflows/patch-access-pass-setup-state.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/access-pass-order-delivery
          fetch-depth: 0

      - name: Add safe pre-migration state
        run: |
          python - <<'PY'
          from pathlib import Path

          service_path = Path("src/server/accessPassService.ts")
          service = service_path.read_text()
          old = '''async function handleStatus(req: RequestLike, res: ResponseLike) {
            if (req.method !== "GET") return res.status(405).json({ ok: false, error: "Use GET." });
            const admin = makeAdmin();
            const user = await authenticate(admin, req);
            const order = await loadOrderByUser(admin, user.id);
            const claim = await loadClaimByUser(admin, user.id);
            return res.status(200).json({ ok: true, ...publicOrder(order, claim), priceXrp: PRICE_XRP });
          }'''
          new = '''async function handleStatus(req: RequestLike, res: ResponseLike) {
            if (req.method !== "GET") return res.status(405).json({ ok: false, error: "Use GET." });
            const admin = makeAdmin();
            const user = await authenticate(admin, req);
            try {
              const order = await loadOrderByUser(admin, user.id);
              const claim = await loadClaimByUser(admin, user.id);
              return res.status(200).json({ ok: true, setupRequired: false, ...publicOrder(order, claim), priceXrp: PRICE_XRP });
            } catch (error) {
              const message = error instanceof Error ? error.message : "";
              if (message.includes("Access Pass order could not be loaded")) {
                return res.status(200).json({
                  ok: true,
                  setupRequired: true,
                  order: null,
                  claim: null,
                  priceXrp: PRICE_XRP,
                });
              }
              throw error;
            }
          }'''
          if old not in service:
              raise SystemExit("handleStatus block not found")
          service_path.write_text(service.replace(old, new, 1))

          client_path = Path("src/lib/accessPassOrderClient.ts")
          client = client_path.read_text()
          old = '''  alreadyPaid?: boolean;
            priceXrp?: string;'''
          new = '''  alreadyPaid?: boolean;
            setupRequired?: boolean;
            priceXrp?: string;'''
          if old not in client:
              raise SystemExit("AccessPassResponse block not found")
          client_path.write_text(client.replace(old, new, 1))

          panel_path = Path("src/components/AccessPassOrderPanel.tsx")
          panel = panel_path.read_text()
          replacements = [
            (
              '''  const [claim, setClaim] = useState<AccessPassClaim | null>(null);
                const [busy, setBusy] = useState("");''',
              '''  const [claim, setClaim] = useState<AccessPassClaim | null>(null);
                const [setupRequired, setSetupRequired] = useState(false);
                const [busy, setBusy] = useState("");'''
            ),
            (
              '''      setOrder(response.order ?? null);
                    setClaim(response.claim ?? null);
                    setError("");''',
              '''      setOrder(response.order ?? null);
                    setClaim(response.claim ?? null);
                    setSetupRequired(Boolean(response.setupRequired));
                    setError("");'''
            ),
            (
              '''            {message && <p className="mt-6 rounded-2xl border border-blue-100 bg-blue-50 p-4 text-sm leading-6 text-blue-950">{message}</p>}
                        {(error || order?.error_message || claim?.error_message) && <p className="mt-6 rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm leading-6 text-rose-950">{error || claim?.error_message || order?.error_message}</p>}''',
              '''            {setupRequired && <p className="mt-6 rounded-2xl border border-amber-200 bg-amber-50 p-4 text-sm leading-6 text-amber-950">{en ? "The Access Pass flow is built and safely disabled until the prepared Supabase migration is activated." : "De Access Pass-flow is gebouwd en veilig uitgeschakeld totdat de voorbereide Supabase-migratie is geactiveerd."}</p>}
                        {message && <p className="mt-6 rounded-2xl border border-blue-100 bg-blue-50 p-4 text-sm leading-6 text-blue-950">{message}</p>}
                        {(error || order?.error_message || claim?.error_message) && <p className="mt-6 rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm leading-6 text-rose-950">{error || claim?.error_message || order?.error_message}</p>}'''
            ),
            (
              '''            ) : !hasWallet ? (
                          <ActionButton onClick={() => onNavigate?.("xaman")} icon={Wallet} text={en ? "Connect receiving wallet" : "Ontvangstwallet koppelen"} />
                        ) : issued ? (''',
              '''            ) : !hasWallet ? (
                          <ActionButton onClick={() => onNavigate?.("xaman")} icon={Wallet} text={en ? "Connect receiving wallet" : "Ontvangstwallet koppelen"} />
                        ) : setupRequired ? (
                          <div className="rounded-2xl border border-amber-200 bg-amber-50 p-5 text-amber-950"><ShieldCheck size={24} /><p className="mt-3 font-semibold">{en ? "Setup pending" : "Configuratie in afwachting"}</p><p className="mt-2 text-sm leading-6">{en ? "No payment can be started until the database migration is active." : "Er kan geen betaling worden gestart totdat de databasemigratie actief is."}</p></div>
                        ) : issued ? ('''
            ),
          ]
          for old_text, new_text in replacements:
              if old_text not in panel:
                  raise SystemExit(f"Panel patch target not found: {old_text[:60]}")
              panel = panel.replace(old_text, new_text, 1)
          panel_path.write_text(panel)
          PY

          rm .github/workflows/patch-access-pass-setup-state.yml

      - name: Commit safe setup state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/server/accessPassService.ts src/lib/accessPassOrderClient.ts src/components/AccessPassOrderPanel.tsx .github/workflows/patch-access-pass-setup-state.yml
          git commit -m "Handle Access Pass setup before database migration"
          git push origin HEAD:feature/access-pass-order-delivery
