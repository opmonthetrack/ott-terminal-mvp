name: One-shot certificate type patch

on:
  push:
    branches:
      - feature/complete-platform-foundations
    paths:
      - .github/workflows/patch-certificate-admin-type.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/complete-platform-foundations
          fetch-depth: 0

      - name: Apply exact type correction
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'type AdminClient = ReturnType<typeof createClient>;' api/certificate.ts
          sed -i 's/type AdminClient = ReturnType<typeof createClient>;/type AdminClient = ReturnType<typeof makeAdmin>;/' api/certificate.ts
          grep -F 'type AdminClient = ReturnType<typeof makeAdmin>;' api/certificate.ts

      - name: Commit correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add api/certificate.ts
          git commit -m 'Fix consolidated certificate Supabase client type'
          git push origin HEAD:feature/complete-platform-foundations
