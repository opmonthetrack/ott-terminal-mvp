name: Apply Full Language Files

on:
  push:
    branches:
      - feature/academy-ai-profile-session
    paths:
      - scripts/apply-terminal-home-tab.mjs
      - scripts/apply-xaman-center-tab.mjs
      - scripts/apply-ledger-intel-tab.mjs
      - scripts/apply-ott-intelligence-tab.mjs
      - scripts/apply-news-tab.mjs
      - scripts/apply-daily-check-in-tab.mjs
      - scripts/apply-roadmap-tab.mjs
      - scripts/apply-roadmap-final-localization.mjs
      - .github/workflows/apply-full-language-files.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/academy-ai-profile-session
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply bilingual public-tab files
        run: |
          node scripts/apply-terminal-home-tab.mjs
          node scripts/apply-xaman-center-tab.mjs
          node scripts/apply-ledger-intel-tab.mjs
          node scripts/apply-ott-intelligence-tab.mjs
          node scripts/apply-news-tab.mjs
          node scripts/apply-daily-check-in-tab.mjs
          node scripts/apply-roadmap-tab.mjs
          node scripts/apply-roadmap-final-localization.mjs

      - name: Install dependencies
        run: npm ci

      - name: Validate full TypeScript project
        run: npm run lint

      - name: Commit bilingual public tabs
        run: |
          if git diff --quiet; then
            echo "No language file changes needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/tabs/TerminalHomeTab.tsx \
            src/tabs/XamanCenterTab.tsx \
            src/tabs/LedgerIntelTab.tsx \
            src/tabs/OTTIntelligence.tsx \
            src/tabs/NewsTab.tsx \
            src/tabs/DailyCheckInTab.tsx \
            src/tabs/RoadmapTab.tsx
          git commit -m "Make all public core tabs consistently bilingual [skip ci]"
          git pull --rebase origin feature/academy-ai-profile-session
          git push origin HEAD:feature/academy-ai-profile-session
