name: Public auth probe

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install reproducibly
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        run: |
          npm install --no-save --no-package-lock playwright
          npx playwright install --with-deps chromium

      - name: Probe production account configuration safely
        run: node scripts/public-auth-probe.mjs
        env:
          AUDIT_BASE_URL: https://ott-terminal-mvp.vercel.app
          AUDIT_OUTPUT_DIR: artifacts/public-auth-probe

      - name: Upload auth evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ott-public-auth-probe
          path: artifacts/public-auth-probe
          if-no-files-found: error
          retention-days: 14
