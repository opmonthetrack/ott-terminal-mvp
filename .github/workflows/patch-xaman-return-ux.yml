name: Patch Xaman return UX

on:
  push:
    branches:
      - feature/site-completion-audit
    paths:
      - .github/xaman-return-ux-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout completion branch
        uses: actions/checkout@v4
        with:
          ref: feature/site-completion-audit
          fetch-depth: 0

      - name: Patch Xaman return UX
        run: node scripts/patch-xaman-return-ux.mjs

      - name: Run public route audit
        run: node scripts/audit-public-routes.mjs

      - name: Commit application patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "Keep Xaman returns on the correct page"
          git push origin HEAD:feature/site-completion-audit
