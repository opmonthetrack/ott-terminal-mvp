name: Apply XRPL wallet hub

on:
  pull_request:
    branches:
      - agent/full-release-hardening-20260724
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'agent/xrpl-wallet-hub-20260724' || github.ref_name == 'agent/xrpl-wallet-hub-20260724'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wallet hub branch
        uses: actions/checkout@v4
        with:
          ref: agent/xrpl-wallet-hub-20260724
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate dependency lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Apply controlled integration
        run: node scripts/apply-wallet-hub-integration.mjs

      - name: Install reproducibly
        run: npm ci --ignore-scripts

      - name: Validate routes TypeScript and production build
        run: npm run quality

      - name: Commit validated integration
        run: |
          git config user.name "ott-quality-bot"
          git config user.email "actions@users.noreply.github.com"
          git add package-lock.json src/App.tsx src/tabs/WalletTab.tsx
          if git diff --cached --quiet; then
            echo "No integration changes to commit."
            exit 0
          fi
          git commit -m "Integrate provider-neutral XRPL wallet hub"
          git push origin HEAD:agent/xrpl-wallet-hub-20260724
