name: Live Production Smoke Test

on:
  push:
    branches:
      - qa/live-production-smoke
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout QA branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm install --no-save playwright@1.54.1

      - name: Install Chromium dependencies
        run: npx playwright install --with-deps chromium

      - name: Run all-tab production browser test
        continue-on-error: true
        env:
          BASE_URL: https://ott-terminal-mvp.vercel.app
        run: node scripts/live-smoke-test.mjs

      - name: Run targeted functional smoke test
        env:
          BASE_URL: https://ott-terminal-mvp.vercel.app
        run: node scripts/live-functional-smoke.mjs

      - name: Upload QA reports and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ott-live-qa-report
          path: artifacts
          if-no-files-found: error
          retention-days: 14
