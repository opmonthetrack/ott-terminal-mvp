name: Apply site completion patch

on:
  push:
    branches:
      - feature/site-completion-audit
    paths:
      - .github/site-completion-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout completion branch
        uses: actions/checkout@v4
        with:
          ref: feature/site-completion-audit
          fetch-depth: 0

      - name: Apply deterministic App patch
        run: node scripts/patch-site-completion.mjs

      - name: Verify public route contract
        run: node scripts/audit-public-routes.mjs

      - name: Commit patched application
        shell: bash
        run: |
          if git diff --quiet -- src/App.tsx; then
            echo "No App changes were needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "Complete public routing and Xaman return navigation"
          git push origin HEAD:feature/site-completion-audit
