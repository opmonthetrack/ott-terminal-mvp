name: Preview flow probe

on:
  push:
    branches:
      - agent/full-release-hardening-20260724
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install reproducibly
        run: npm ci --no-audit --no-fund

      - name: Install Chromium probe tools
        run: |
          npm install --no-save --no-package-lock playwright
          npx playwright install --with-deps chromium

      - name: Probe ready Vercel preview without signing
        run: node scripts/preview-flow-probe.mjs
        env:
          AUDIT_BASE_URL: https://ott-terminal-mvp-git-agent-full-release-harde-7397fa-onthetrack.vercel.app
          AUDIT_OUTPUT_DIR: artifacts/preview-flow-probe

      - name: Upload probe evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ott-preview-flow-probe
          path: artifacts/preview-flow-probe
          if-no-files-found: error
          retention-days: 14
