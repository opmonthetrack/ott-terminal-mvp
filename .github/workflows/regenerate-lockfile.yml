name: Regenerate dependency lockfile

on:
  push:
    branches:
      - agent/full-release-hardening-20260724
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Prove clean reproducible install
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run existing quality checks
        run: npm run quality

      - name: Upload regenerated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-package-lock
          path: package-lock.json
          if-no-files-found: error
          retention-days: 7
