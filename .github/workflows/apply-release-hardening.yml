name: Apply release hardening

on:
  push:
    branches:
      - agent/full-release-hardening-20260724
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout proposed changes
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Prepare evidence directory
        run: mkdir -p artifacts/hardening-patch

      - name: Regenerate dependency lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Apply controlled source migration
        run: |
          node scripts/apply-release-hardening.mjs
          node scripts/fix-release-hardening-output.mjs

      - name: Prove clean installation
        run: npm ci --no-audit --no-fund

      - name: Validate routes, TypeScript and production build
        id: quality
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run quality 2>&1 | tee artifacts/hardening-patch/quality.log

      - name: Record changed files
        if: always()
        run: |
          git diff --name-only > artifacts/hardening-patch/changed-files.txt
          cp package-lock.json artifacts/hardening-patch/package-lock.json
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              mkdir -p "artifacts/hardening-patch/$(dirname "$file")"
              cp "$file" "artifacts/hardening-patch/$file"
            fi
          done < artifacts/hardening-patch/changed-files.txt
          echo "quality_outcome=${{ steps.quality.outcome }}" > artifacts/hardening-patch/status.txt

      - name: Upload validated hardening patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validated-release-hardening-patch
          path: artifacts/hardening-patch
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

      - name: Enforce quality success
        if: always() && steps.quality.outcome != 'success'
        run: exit 1
