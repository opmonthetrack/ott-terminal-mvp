name: Academy Profile Preview Smoke

on:
  push:
    branches:
      - feature/academy-ai-profile-session
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm install --no-save playwright@1.54.1

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel preview
        run: sleep 45

      - name: Run Academy and profile preview smoke
        env:
          BASE_URL: https://ott-terminal-mvp-git-feature-academy-ai-profi-a21efa-onthetrack.vercel.app
        run: node scripts/academy-profile-preview-smoke.mjs

      - name: Upload preview smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: academy-profile-preview-smoke
          path: artifacts/academy-profile-preview
          if-no-files-found: error
          retention-days: 14
