<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    <meta name="application-name" content="OTT Terminal" />
    <meta
      name="description"
      content="XRPL OnTheTrack Terminal is an account-first learning, research and verified on-ledger action platform for the XRP Ledger ecosystem."
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />

    <link rel="canonical" href="https://ott-terminal-mvp.vercel.app/" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OTT Terminal" />
    <meta property="og:title" content="XRPL OnTheTrack Terminal" />
    <meta
      property="og:description"
      content="Learn XRPL step by step, connect Xaman when an on-ledger signature is needed, and follow verified terminal activity."
    />
    <meta property="og:url" content="https://ott-terminal-mvp.vercel.app/" />
    <meta property="og:image" content="https://ott-terminal-mvp.vercel.app/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="XRPL OnTheTrack Terminal" />
    <meta
      name="twitter:description"
      content="Account-first XRPL learning, research and verified on-ledger actions."
    />
    <meta name="twitter:image" content="https://ott-terminal-mvp.vercel.app/logo.png" />

    <title>OTT Terminal | XRPL learning platform</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get("founder") === "1") {
          document.documentElement.dataset.founder = "1";
        }
      })();
    </script>
    <style>
      html:not([data-founder="1"]) aside > div:last-child > button:first-of-type,
      html:not([data-founder="1"]) div[role="dialog"] > div > div:last-child > button:first-of-type {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
