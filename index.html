<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XRPL OTT Terminal</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get("founder") === "1") {
          document.documentElement.dataset.founder = "1";
        }
      })();
    </script>
    <style>
      html:not([data-founder="1"]) aside > div:last-child > button:first-of-type,
      html:not([data-founder="1"]) div[role="dialog"] > div > div:last-child > button:first-of-type {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
